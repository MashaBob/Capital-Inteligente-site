/* style = CSS стили сайта */

/* ===================================================== */
/* RESET / BASE */
/* ===================================================== */
/* RESET = базовые настройки */
/* BASE = основа сайта */

/* ===================================================== */
/* BODY */
/* ===================================================== */

body{

    /* ---------- SPACING ---------- */
    /* SPACING = отступы */

    margin:0;
    /* margin = внешний отступ */
    /* 0 = убрать белые края браузера */

    /* ---------- BACKGROUND ---------- */
    /* BACKGROUND = фон */

    background:#0b1220;
    /* Цвет фона сайта */

    /* ---------- TYPOGRAPHY ---------- */
    /* TYPOGRAPHY = текст */

    font-family:Arial;
    /* Главный шрифт сайта */

    color:white;
    /* Цвет текста */

    /* ---------- OVERFLOW ---------- */
    /* OVERFLOW = выход контента */

    overflow-x:hidden;
    /* Убирает горизонтальный скролл */

    /* ---------- POSITION ---------- */
    /* POSITION = позиционирование */

    position:relative;
    /* Основа для absolute элементов */

}

/* ===================================================== */
/* BACKGROUND GRID */
/* ===================================================== */
/* GRID = сетка на фоне */

/* ===================================================== */
/* BODY BEFORE */
/* ===================================================== */

body::before{

    /* before = дополнительный слой */

    content:"";
    /* Обязателен для before */

    position:fixed;
    /* fixed = приклеен к экрану */

    width:100%;
    /* Ширина */

    height:100%;
    /* Высота */

    /* ---------- GRID LINES ---------- */
    /* Линии сетки */

    background-image:

    linear-gradient(
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    ),
    /* Горизонтальные линии */

    linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    );
    /* Вертикальные линии */

    background-size:40px 40px;
    /* Размер клеток */

    z-index:-1;
    /* Отправляет слой назад */

}

/* ===================================================== */
/* LAYOUT */
/* ===================================================== */
/* LAYOUT = структура сайта */

/* ===================================================== */
/* CONTAINER */
/* ===================================================== */

.container{

    display:flex;
    /* flex = ставит блоки рядом */

    /* Раздвигает блоки */

}

}

}

/* ===================================================== */

/* ===================================================== */

.green{

    /* Цвет текста */

    /* Размер текста */

/* ===================================================== */

h1{

/* ===================================================== */

.desc{

  /* ===================================================== */
/* BUTTONS */
/* ===================================================== */
/* BUTTONS = кнопки сайта */

/* ===================================================== */
/* MAIN BUTTON */
/* ===================================================== */

button{

    /* ---------- BACKGROUND ---------- */
    /* Цвет кнопки */

    background:#00ffcc;

    /* ---------- BORDER ---------- */
    /* BORDER = рамка */

    border:none;
    /* Убирает рамку */

    /* ---------- SPACING ---------- */
    /* Размер кнопки */

    padding:16px 36px;
    /* 16px = верх/низ */
    /* 36px = лево/право */

    /* ---------- BORDER RADIUS ---------- */
    /* Скругление углов */

    border-radius:14px;

    /* ---------- TYPOGRAPHY ---------- */
    /* Текст */

    /* Размер текста */

    /* ---------- CURSOR ---------- */

    cursor:pointer;

    /* Свечение */

.card{

    /* Основа для absolute */

<script>
<!-- Начало JavaScript -->

/* ===================================================== */
/* API KEY */
/* ===================================================== */

const API_KEY = "DQBKGW2B7BDA8NC7";
/* API_KEY = ключ доступа к AlphaVantage API */

/* ===================================================== */
/* MARKET DATA */
/* ===================================================== */
/* MARKET DATA = данные рынков */

async function loadMarketData(){
/* async function = асинхронная функция */
/* loadMarketData = загрузка данных рынков */

try{
/* try = попытка выполнить код */

const markets = [
/* markets = массив рынков */

{
id:"usa",
/* id HTML элемента */

symbol:"SPY",
/* symbol = биржевой тикер */

name:"🇺🇸 Estados Unidos"
/* Название */

},

{
id:"mexico",

symbol:"EWW",

name:"🇲🇽 México"

},

{
id:"uk",

symbol:"EWU",

name:"🇬🇧 Reino Unido"

},

{
id:"japan",

symbol:"EWJ",

name:"🇯🇵 Japón"

},

{
id:"brazil",

symbol:"EWZ",

name:"🇧🇷 Brasil"

}

];
/* Конец массива */

/* ===================================================== */
/* LOOP MARKETS */
/* ===================================================== */
/* LOOP = цикл */

/* market = один объект из массива markets */

for(const market of markets){

/* fetch = запрос к API */

const res = await fetch(

`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${market.symbol}&apikey=${API_KEY}`

);
/* URL запроса */
/* function=GLOBAL_QUOTE = получить котировку */
/* symbol=${market.symbol} = тикер */
/* apikey=${API_KEY} = API ключ */

/* ===================================================== */
/* JSON */
/* ===================================================== */

/* ===================================================== */
/* CANVAS */
/* ===================================================== */
/* CANVAS = область рисования */

/* ===================================================== */
/* GET CANVAS */
/* ===================================================== */

const canvas = document.getElementById("sphere");
/* Находит canvas */

/* ===================================================== */
/* CONTEXT */
/* ===================================================== */

const ctx = canvas.getContext("2d");
/* 2D режим рисования */

/* ===================================================== */
/* MOUSE */
/* ===================================================== */

let mouseX = 0;
/* Позиция мышки X */

let mouseY = 0;
/* Позиция мышки Y */

/* ===================================================== */
/* ROTATION */
/* ===================================================== */

let angleX = 0;
/* Поворот по X */

let angleY = 0;
/* Поворот по Y */

let auto = 0;
/* Автоматическое вращение */

/* ===================================================== */
/* MOUSE MOVE */
/* ===================================================== */
/* Отслеживание движения мышки */

canvas.addEventListener("mousemove", e => {

/* getBoundingClientRect()
   = размеры и позиция canvas */

let rect = canvas.getBoundingClientRect();

/* ===================================================== */
/* MOUSE X */
/* ===================================================== */

mouseX = (e.clientX - rect.left - 350) / 350;

/* e.clientX = позиция мышки */
/* rect.left = левая граница canvas */
/* 350 = центр canvas */

/* ===================================================== */
/* MOUSE Y */
/* ===================================================== */

mouseY = (e.clientY - rect.top - 350) / 350;

/* e.clientY = позиция мышки */
/* rect.top = верхняя граница */

});

/* ===================================================== */
/* POINTS */
/* ===================================================== */
/* Точки 3D шара */

const pts = [];
/* pts = массив точек */

/* ===================================================== */
/* CREATE POINTS */
/* ===================================================== */

for(let i = 0; i < 1500; i++){
/* Создаёт 1500 точек */

let t = Math.random() * Math.PI * 2;
/* Случайный угол */

/* Math.random() = случайное число */
/* Math.PI = число π */

let p = Math.acos(Math.random() * 2 - 1);
/* Позиция точки */

let r = 250;
/* Радиус шара */

pts.push({

x:r*Math.sin(p)*Math.cos(t),
/* Координата X */

y:r*Math.sin(p)*Math.sin(t),
/* Координата Y */

z:r*Math.cos(p)
/* Координата Z */

});
/* push = добавить в массив */

}

/* ===================================================== */
/* DRAW FUNCTION */
/* ===================================================== */
/* draw = функция рисования */

function draw(){

/* ===================================================== */
/* CLEAR CANVAS */
/* ===================================================== */

ctx.clearRect(0,0,700,700);
/* Очищает canvas */

/* ===================================================== */
/* AUTO ROTATION */
/* ===================================================== */

auto += 0.002;
/* Скорость автовращения */

/* ===================================================== */
/* SMOOTH ROTATION */
/* ===================================================== */

angleX += (mouseY - angleX) * 0.05;
/* Плавный поворот */

angleY += (mouseX + auto - angleY) * 0.05;
/* Плавный поворот */

/* ===================================================== */
/* LOOP POINTS */
/* ===================================================== */

pts.forEach(p => {
/* Цикл по всем точкам */

/* ===================================================== */
/* 3D CALCULATIONS */
/* ===================================================== */
/* Математика 3D шара */

let x = p.x;
/* Берёт координату X */

let y = p.y*Math.cos(angleX)-p.z*Math.sin(angleX);
/* Поворот по оси X */

let z = p.y*Math.sin(angleX)+p.z*Math.cos(angleX);
/* Глубина после поворота */

let x2 = x*Math.cos(angleY)-z*Math.sin(angleY);
/* Поворот по оси Y */

let z2 = x*Math.sin(angleY)+z*Math.cos(angleY);
/* Новая глубина */

/* ===================================================== */
/* SCALE */
/* ===================================================== */

let scale = 600/(600+z2);
/* scale = масштаб */
/* Чем ближе точка — тем больше */

/* ===================================================== */
/* SCREEN POSITION */
/* ===================================================== */

let px = 350 + x2*scale;
/* Позиция точки X на экране */

let py = 350 + y*scale;
/* Позиция точки Y на экране */

/* ===================================================== */
/* DRAW DOT */
/* ===================================================== */

ctx.beginPath();
/* Начинает рисование */

ctx.arc(px,py,2*scale,0,Math.PI*2);
/* arc = круг */
/* px py = позиция */
/* 2*scale = размер */

/* ===================================================== */
/* DOT COLOR */
/* ===================================================== */

ctx.fillStyle = "#00ffcc";
/* Цвет точки */

/* ===================================================== */
/* FILL */
/* ===================================================== */

ctx.fill();
/* Закрашивает точку */

});
/* Конец цикла */

/* ===================================================== */
/* NEXT FRAME */
/* ===================================================== */

requestAnimationFrame(draw);
/* Повторяет draw снова */

}
/* Конец draw */

/* ===================================================== */
/* START DRAW */
/* ===================================================== */

draw();
/* Запускает анимацию шара */

/* ===================================================== */
/* NUMBER ANIMATION */
/* ===================================================== */
/* Анимация цифр */

function animateValue(id,start,end,duration){
/* id = какой элемент */
/* start = старт */
/* end = конец */
/* duration = длительность */

let obj = document.getElementById(id);
/* Находит HTML элемент */

let startTime = null;
/* Время старта */

/* ===================================================== */
/* STEP FUNCTION */
/* ===================================================== */

function step(timestamp){
/* timestamp = время кадра */

if(!startTime){
/* Если первый кадр */

startTime = timestamp;
/* Запоминает старт */

}

/* ===================================================== */
/* PROGRESS */
/* ===================================================== */

let progress = Math.min(
(timestamp - startTime) / duration,
1
);
/* progress от 0 до 1 */

/* ===================================================== */
/* PROFIT */
/* ===================================================== */

if(id === "profit"){
/* Если profit */

obj.innerHTML =
"+" + Math.floor(
progress * (end - start) + start
);
/* Анимирует число */

/* ===================================================== */
/* OTHER VALUES */
/* ===================================================== */

}else{

obj.innerHTML =
Math.floor(
progress * (end - start) + start
) + "%";
/* Добавляет % */

}

/* ===================================================== */
/* CONTINUE */
/* ===================================================== */

if(progress < 1){
/* Пока анимация не закончилась */

requestAnimationFrame(step);
/* Следующий кадр */

}

}
/* Конец step */

/* ===================================================== */
/* START */
/* ===================================================== */

requestAnimationFrame(step);
/* Старт анимации */

}
/* Конец animateValue */

/* RUN ANIMATION */
/* ===================================================== */

/* ===================================================== */
