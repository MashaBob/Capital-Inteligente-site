/* ===================================================== */
/* BODY */

body{ /* Всё тело сайта */

}

/* ===================================================== */
/* BACKGROUND GRID */
/* ===================================================== */

body::before{ /* Дополнительный слой перед body */

    content:""; /* Пустое содержимое */

    position:fixed; /* Фиксированное положение */

    width:100%; /* Ширина на весь экран */

    height:100%; /* Высота на весь экран */

    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), /* Горизонтальные линии */
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); /* Вертикальные линии */

    background-size:40px 40px; /* Размер клеток сетки */

    z-index:-1; /* Отправляет слой назад */

}

/* ===================================================== */
/* CONTAINER */
/* ===================================================== */

.container{ /* Главный контейнер */

    display:flex; /* Flexbox */

    justify-content:space-between; /* Пространство между блоками */

button{ /* Все кнопки сайта */

}

button:hover{ /* Наведение мышки */

  <script>
/* Начало JavaScript */

/* ===================================================== */
/* API KEY */
/* ===================================================== */

const API_KEY = "DQBKGW2B7BDA8NC7";
/* Ключ AlphaVantage */

/* ===================================================== */
/* MARKET DATA */
/* ===================================================== */

async function loadMarketData(){
/* Функция загрузки рынков */

try{
/* Попытка выполнить код */

const markets = [
/* Массив рынков */

{
id:"usa",
/* id HTML элемента */

symbol:"SPY",
/* Биржевой тикер */

name:"🇺🇸 Estados Unidos"
/* Название */

},

{
id:"mexico",

symbol:"EWW",

name:"🇲🇽 México"

},

{
id:"uk",

symbol:"EWU",

name:"🇬🇧 Reino Unido"

},

{
id:"japan",

symbol:"EWJ",

name:"🇯🇵 Japón"

},

{
id:"brazil",

symbol:"EWZ",

name:"🇧🇷 Brasil"

}

];
/* Конец массива */

for(const market of markets){
/* Цикл */

const res = await fetch(
/* Запрос к API */

`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${market.symbol}&apikey=${API_KEY}`

);

const data = await res.json();
/* JSON ответ */

const quote = data["Global Quote"];
/* Котировка */

if(quote){
/* Проверка */

const change = quote["10. change percent"];
/* Процент изменения */

document.getElementById(market.id).innerHTML =
`${market.name}<br>${change}`;
/* Вставка текста */

}

}

}catch(e){
/* Ошибка */

console.log(e);
/* Вывод ошибки */

}

}

/* ===================================================== */
/* CANVAS */
/* ===================================================== */

const canvas = document.getElementById("sphere");
/* Находит canvas */

const ctx = canvas.getContext("2d");
/* 2D рисование */

let mouseX = 0;
/* Позиция мышки X */

let mouseY = 0;
/* Позиция мышки Y */

let angleX = 0;
/* Поворот X */

let angleY = 0;
/* Поворот Y */

let auto = 0;
/* Автовращение */

canvas.addEventListener("mousemove", e => {
/* Движение мышки */

let rect = canvas.getBoundingClientRect();
/* Размеры canvas */

mouseX = (e.clientX - rect.left - 350) / 350;
/* Координата X */

mouseY = (e.clientY - rect.top - 350) / 350;
/* Координата Y */

});

const pts = [];
/* Точки шара */

for(let i = 0; i < 1500; i++){
/* Создание точек */

let t = Math.random() * Math.PI * 2;
/* Случайный угол */

let p = Math.acos(Math.random() * 2 - 1);
/* Позиция */

let r = 250;
/* Радиус */

pts.push({

x:r*Math.sin(p)*Math.cos(t),

y:r*Math.sin(p)*Math.sin(t),

z:r*Math.cos(p)

});
/* Добавляет точку */

}

/* ===================================================== */
/* DRAW */
/* ===================================================== */

function draw(){
/* Рисование */

ctx.clearRect(0,0,700,700);
/* Очистка canvas */

auto += 0.002;
/* Автовращение */

angleX += (mouseY - angleX) * 0.05;
/* Плавный поворот */

angleY += (mouseX + auto - angleY) * 0.05;
/* Плавный поворот */

pts.forEach(p => {
/* Цикл точек */

let x = p.x;

let y = p.y*Math.cos(angleX)-p.z*Math.sin(angleX);

let z = p.y*Math.sin(angleX)+p.z*Math.cos(angleX);

let x2 = x*Math.cos(angleY)-z*Math.sin(angleY);

let z2 = x*Math.sin(angleY)+z*Math.cos(angleY);

let scale = 600/(600+z2);
/* Глубина */

let px = 350 + x2*scale;
/* Позиция X */

let py = 350 + y*scale;
/* Позиция Y */

ctx.beginPath();
/* Начало рисования */

ctx.arc(px,py,2*scale,0,Math.PI*2);
/* Круг */

ctx.fillStyle = "#00ffcc";
/* Цвет */

ctx.fill();
/* Заливка */

});

requestAnimationFrame(draw);
/* Повтор анимации */

}

draw();
/* Запуск */

/* ===================================================== */
/* LIVE PRICES */
/* ===================================================== */

async function loadPrices(){
/* Загрузка цен крипты */

try{
/* Попытка выполнить */

const res = await fetch(
/* Запрос к CoinGecko API */

"https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd,mxn"

);

const data = await res.json();
/* JSON ответ */

document.getElementById("btc").innerHTML =
"BTC: $" + data.bitcoin.usd.toLocaleString();
/* Цена Bitcoin */

document.getElementById("eth").innerHTML =
"ETH: $" + data.ethereum.usd.toLocaleString();
/* Цена Ethereum */

document.getElementById("mxn").innerHTML =
"MXN: " + data.bitcoin.mxn.toLocaleString();
/* BTC в MXN */

}catch(e){
/* Ошибка */

console.log(e);
/* Вывод ошибки */

}

}

loadPrices();
/* Первый запуск */

setInterval(loadPrices,10000);
/* Повтор каждые 10 секунд */

/* ===================================================== */
/* ANIMATION */
/* ===================================================== */

function animateValue(id,start,end,duration){
/* Анимация цифр */

let obj = document.getElementById(id);
/* Находит элемент */

let startTime = null;
/* Время старта */

function step(timestamp){
/* Кадр анимации */

if(!startTime){
/* Если первый кадр */

startTime = timestamp;
/* Запоминает время */

}

let progress = Math.min(
(timestamp - startTime) / duration,
1
);
/* Прогресс от 0 до 1 */

if(id === "profit"){
/* Если profit */

obj.innerHTML =
"+" + Math.floor(
progress * (end - start) + start
);
/* Анимирует число */

}else{
/* Для остальных */

obj.innerHTML =
Math.floor(
progress * (end - start) + start
) + "%";
/* Добавляет % */

}

if(progress < 1){
/* Пока не закончено */

requestAnimationFrame(step);
/* Следующий кадр */

}

}

requestAnimationFrame(step);
/* Старт */

}

animateValue("profit",0,9434,2000);
/* Анимация profit */

animateValue("win",0,83,2000);
/* Анимация win */

/* ===================================================== */
/* START MARKET DATA */
/* ===================================================== */

loadMarketData();
/* Первая загрузка */

setInterval(loadMarketData,300000);
/* Обновление каждые 5 минут */

/* ===================================================== */
/* TRADINGVIEW */
/* ===================================================== */

new TradingView.widget({
/* Создание TradingView */

width:620,
/* Ширина */

height:360,
/* Высота */

symbol:"BINANCE:BTCUSDT",
/* Пара */

interval:"15",
/* Таймфрейм */

theme:"dark",
/* Тёмная тема */
