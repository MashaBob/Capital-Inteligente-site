/* ===================================================== */
/* RESET = базовые настройки */
/* BASE = основа сайта */

/* ===================================================== */
/* BODY */
/* ===================================================== */

body{

    /* ---------- SPACING ---------- */
    /* SPACING = отступы */

    margin:0;
    /* margin = внешний отступ */
    /* 0 = убрать белые края браузера */

    /* ---------- BACKGROUND ---------- */
    /* BACKGROUND = фон */

    background:#0b1220;
    /* Цвет фона сайта */

    /* ---------- TYPOGRAPHY ---------- */
    /* TYPOGRAPHY = текст */

    font-family:Arial;
    /* Главный шрифт сайта */

    color:white;
    /* Цвет текста */

    /* ---------- OVERFLOW ---------- */
    /* OVERFLOW = выход контента */

    overflow-x:hidden;
    /* Убирает горизонтальный скролл */

    /* ---------- POSITION ---------- */
    /* POSITION = позиционирование */

    position:relative;
    /* Основа для absolute элементов */

}

/* ===================================================== */
/* BACKGROUND GRID */
/* ===================================================== */
/* GRID = сетка на фоне */

/* ===================================================== */
/* BODY BEFORE */
/* ===================================================== */

body::before{

    /* before = дополнительный слой */

    content:"";
    /* Обязателен для before */

    position:fixed;
    /* fixed = приклеен к экрану */

    width:100%;
    /* Ширина */

    height:100%;
    /* Высота */

    /* ---------- GRID LINES ---------- */
    /* Линии сетки */

    background-image:

    linear-gradient(
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    ),
    /* Горизонтальные линии */

    linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 1px,
        transparent 1px
    );
    /* Вертикальные линии */

    background-size:40px 40px;
    /* Размер клеток */

    z-index:-1;
    /* Отправляет слой назад */

}

/* ===================================================== */
/* LAYOUT */
/* ===================================================== */
/* LAYOUT = структура сайта */

/* ===================================================== */
/* CONTAINER */
/* ===================================================== */

.container{

    display:flex;
    /* flex = ставит блоки рядом */

h1{

  /* ===================================================== */
/* BUTTONS */
/* ===================================================== */
/* BUTTONS = кнопки сайта */

/* ===================================================== */
/* MAIN BUTTON */
/* ===================================================== */

button{

    /* ---------- BACKGROUND ---------- */
    /* Цвет кнопки */

    background:#00ffcc;

    /* ---------- BORDER ---------- */
    /* BORDER = рамка */

    border:none;
    /* Убирает рамку */

    /* Размер кнопки */

    padding:16px 36px;
    /* 16px = верх/низ */

    /* ---------- BORDER RADIUS ---------- */

    /* ---------- TYPOGRAPHY ---------- */

    /* ---------- CURSOR ---------- */

    cursor:pointer;

    transition:0.3s;

    /* ---------- EFFECTS ---------- */
    /* Свечение */

<script>

const API_KEY = "abc123xyz456";

/* ===================================================== */
/* MARKET DATA */
/* Данные рынков через TwelveData */
/* ===================================================== */

async function loadMarketData(){

try{

/* Список рынков */

const markets = [

{
id:"usa",
symbol:"SPY",
name:"🇺🇸 Estados Unidos"
},

{
id:"mexico",
symbol:"EWW",
name:"🇲🇽 México"
},

{
id:"uk",
symbol:"EWU",
name:"🇬🇧 Reino Unido"
},

{
id:"japan",
symbol:"EWJ",
name:"🇯🇵 Japón"
},

{
id:"brazil",
symbol:"EWZ",
name:"🇧🇷 Brasil"
}

];

/* Цикл */

for(const market of markets){

/* Запрос к TwelveData */

const res = await fetch(`https://api.twelvedata.com/price?symbol=${market.symbol}&apikey=${API_KEY}`);

/* JSON */

const data = await res.json();

/* Если цена пришла */

if(data.price){

/* Генерация изменения */

let percent =
(Math.random() * 4 - 2).toFixed(2);

/* Цвет */

let color =
percent >= 0

/* ===================================================== */
/* CANVAS */
/* ===================================================== */

const canvas = document.getElementById("sphere");

const ctx = canvas.getContext("2d");

let mouseX = 0;
let mouseY = 0;

let angleX = 0;
let angleY = 0;

let auto = 0;

canvas.addEventListener("mousemove", e => {

let rect = canvas.getBoundingClientRect();

mouseX = (e.clientX - rect.left - 350) / 350;

mouseY = (e.clientY - rect.top - 350) / 350;

});

const pts = [];

for(let i = 0; i < 1500; i++){

let t = Math.random() * Math.PI * 2;

let p = Math.acos(Math.random() * 2 - 1);

let r = 250;

pts.push({

x:r*Math.sin(p)*Math.cos(t),

y:r*Math.sin(p)*Math.sin(t),

z:r*Math.cos(p)

});

}

function draw(){

ctx.clearRect(0,0,700,700);

auto += 0.002;

angleX += (mouseY - angleX) * 0.05;

angleY += (mouseX + auto - angleY) * 0.05;

pts.forEach(p => {

let x = p.x;

let y = p.y*Math.cos(angleX)-p.z*Math.sin(angleX);

let z = p.y*Math.sin(angleX)+p.z*Math.cos(angleX);

let x2 = x*Math.cos(angleY)-z*Math.sin(angleY);

let z2 = x*Math.sin(angleY)+z*Math.cos(angleY);

let scale = 600/(600+z2);

let px = 350 + x2*scale;

let py = 350 + y*scale;

ctx.beginPath();

ctx.arc(px,py,2*scale,0,Math.PI*2);

ctx.fillStyle = "#00ffcc";

ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

/* ===================================================== */
/* ANIMATION */
/* ===================================================== */

function animateValue(id,start,end,duration){

let obj = document.getElementById(id);

let startTime = null;

function step(timestamp){

if(!startTime){

startTime = timestamp;

}

let progress = Math.min(
(timestamp - startTime) / duration,
1
);

if(id === "profit"){

obj.innerHTML =
"+" + Math.floor(
progress * (end - start) + start
);

}else{

obj.innerHTML =
Math.floor(
progress * (end - start) + start
) + "%";

}

if(progress < 1){

requestAnimationFrame(step);

}

}

requestAnimationFrame(step);

}
